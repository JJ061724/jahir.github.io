<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💛</title>

<style>
body { margin:0; overflow:hidden; font-family:'Segoe UI'; }

.sky {
  position:absolute;
  top:0;
  width:100%;
  height:60%;
  background:linear-gradient(#4facfe,#a1c4fd);
}

#garden {
  position:absolute;
  bottom:0;
  width:100%;
  height:40%;
  background:linear-gradient(#4CAF50,#1b5e20);
}

.cloud {
  position:absolute;
  width:120px;
  height:60px;
  background:white;
  border-radius:50px;
  opacity:0.9;
  animation:moveClouds 30s linear infinite;
}

@keyframes moveClouds {
  from { transform:translateX(-200px); }
  to { transform:translateX(120vw); }
}

.seed {
  width:12px;
  height:12px;
  background:brown;
  border-radius:50%;
  position:absolute;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  animation:fall 2s forwards;
}

@keyframes fall { to { top:60%; } }

.sunflower {
  position:absolute;
  bottom:40%;
  transform:translateX(-50%);
  opacity:0;
  animation:growUp 2s forwards;
}

@keyframes growUp {
  from { transform:translate(-50%,50%) scale(0); opacity:0; }
  to { transform:translate(-50%,0) scale(1); opacity:1; }
}

.stem {
  width:6px;
  height:100px;
  background:green;
  margin:0 auto;
}

.flower {
  width:60px;
  height:60px;
  margin:0 auto;
  position:relative;
}

.petal {
  width:18px;
  height:36px;
  background:yellow;
  position:absolute;
  top:0;
  left:21px;
  border-radius:50%;
  transform-origin:center 36px;
}

.center {
  width:26px;
  height:26px;
  background:#5d4037;
  border-radius:50%;
  position:absolute;
  top:17px;
  left:17px;
}

.sunflower {
  animation:growUp 2s forwards, sway 3s infinite alternate ease-in-out;
}

@keyframes sway {
  from { transform:translate(-50%,0) rotate(-2deg); }
  to { transform:translate(-50%,0) rotate(2deg); }
}

.message {
  position:absolute;
  bottom:10%;
  width:100%;
  text-align:center;
  color:white;
  font-size:22px;
  text-shadow:2px 2px 5px rgba(0,0,0,0.6);
  opacity:0;
  animation:fadeIn 3s forwards;
  animation-delay:5s;
}

@keyframes fadeIn { to { opacity:1; } }

button {
  position:absolute;
  top:10px;
  right:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffeb3b;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sky"></div>

<button onclick="playMusic()">💛 Música</button>
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2023/03/21/audio_6c7c2c8f0b.mp3" type="audio/mpeg">
</audio>

<div class="cloud" style="top:50px;"></div>
<div class="cloud" style="top:120px;"></div>

<div id="garden"></div>
<div class="seed"></div>

<!-- flores -->
<div class="sunflower"></div>
<div class="sunflower"></div>
<div class="sunflower"></div>
<div class="sunflower"></div>
<div class="sunflower"></div>
<div class="sunflower"></div>
<div class="sunflower"></div>

<div class="message">
  <h2>Te doy esta flor amarilla digital para la mejor novia del mundo ❤️</h2>
  <p>Te amo mucho</p>
</div>

<script>
const flowers = document.querySelectorAll('.sunflower');

flowers.forEach((f,i) => {
  f.style.left = (30 + i*7) + "%";
  f.innerHTML = `
    <div class="flower">
      <div class="petal" style="transform:rotate(0deg);"></div>
      <div class="petal" style="transform:rotate(45deg);"></div>
      <div class="petal" style="transform:rotate(90deg);"></div>
      <div class="petal" style="transform:rotate(135deg);"></div>
      <div class="petal" style="transform:rotate(180deg);"></div>
      <div class="petal" style="transform:rotate(225deg);"></div>
      <div class="petal" style="transform:rotate(270deg);"></div>
      <div class="petal" style="transform:rotate(315deg);"></div>
      <div class="center"></div>
    </div>
    <div class="stem"></div>
  `;
});

// ✨ formar letra M
setTimeout(() => {
  const positions = [
    {left:"35%", bottom:"80%"},
    {left:"35%", bottom:"60%"},
    {left:"45%", bottom:"70%"},
    {left:"50%", bottom:"60%"},
    {left:"55%", bottom:"70%"},
    {left:"65%", bottom:"60%"},
    {left:"65%", bottom:"80%"}
  ];

  flowers.forEach((f,i)=>{
    f.style.transition = "all 2s ease";
    f.style.left = positions[i].left;
    f.style.bottom = positions[i].bottom;
  });

},7000);

function playMusic(){
  document.getElementById('music').play();
}
</script>

</body>
</html>
