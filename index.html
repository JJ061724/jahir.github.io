<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💛</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(#ffcc80, #ff8a65 60%, #ffe0b2);
}

/* Nubes */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: moveClouds 50s linear infinite;
}
.cloud::before, .cloud::after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud::before { width: 60px; height: 60px; top: -20px; left: 10px; }
.cloud::after { width: 80px; height: 80px; top: -30px; right: 10px; }

@keyframes moveClouds {
  from { transform: translateX(-200px); }
  to { transform: translateX(120vw); }
}

#garden {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(#4CAF50, #1b5e20);
}

.seed {
  width: 12px;
  height: 12px;
  background: #5d4037;
  border-radius: 50%;
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  animation: fall 2.5s ease-in forwards;
}

@keyframes fall { to { top: 60%; } }

.sunflower {
  position: absolute;
  bottom: 40%;
  opacity: 0;
  animation: grow 2s forwards;
}

@keyframes grow {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.flower {
  width: 70px;
  height: 70px;
  background: radial-gradient(circle, #ffeb3b 40%, #fbc02d);
  border-radius: 50%;
  position: relative;
  animation: sway 3s ease-in-out infinite alternate;
}

.center {
  width: 28px;
  height: 28px;
  background: #5d4037;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.stem {
  width: 6px;
  height: 100px;
  background: #2e7d32;
  margin: 0 auto;
}

@keyframes sway {
  from { transform: rotate(-3deg); }
  to { transform: rotate(3deg); }
}

/* Partículas */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  animation: float 6s infinite ease-in;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-200px); opacity: 0; }
}

.message {
  position: absolute;
  top: 12%;
  width: 100%;
  text-align: center;
  color: white;
  opacity: 0;
  animation: fadeIn 3s forwards;
  animation-delay: 6s;
}

@keyframes fadeIn { to { opacity: 1; } }

.message h1 {
  font-size: 28px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

.message p {
  font-size: 22px;
  margin-top: 10px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

.typing {
  overflow: hidden;
  white-space: nowrap;
  border-right: 3px solid white;
  width: 0;
  animation: typing 4s steps(50, end) forwards, blink 0.8s infinite;
  animation-delay: 6s;
}

@keyframes typing { to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }

</style>
</head>
<body>

<!-- Música -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- Nubes -->
<div class="cloud" style="width:120px;height:60px;top:50px;left:-150px;"></div>
<div class="cloud" style="width:100px;height:50px;top:120px;left:-200px;animation-duration:60s;"></div>

<div id="garden"></div>
<div class="seed"></div>

<!-- Girasoles -->
<div class="sunflower" style="left:30%; animation-delay:2.5s;">
  <div class="stem"></div>
  <div class="flower"><div class="center"></div></div>
</div>
<div class="sunflower" style="left:40%; animation-delay:3s;">
  <div class="stem"></div>
  <div class="flower"><div class="center"></div></div>
</div>
<div class="sunflower" style="left:50%; animation-delay:3.5s;">
  <div class="stem"></div>
  <div class="flower"><div class="center"></div></div>
</div>
<div class="sunflower" style="left:60%; animation-delay:4s;">
  <div class="stem"></div>
  <div class="flower"><div class="center"></div></div>
</div>
<div class="sunflower" style="left:70%; animation-delay:4.5s;">
  <div class="stem"></div>
  <div class="flower"><div class="center"></div></div>
</div>

<!-- Partículas -->
<div class="particle" style="left:20%; bottom:10%; animation-delay:1s;"></div>
<div class="particle" style="left:50%; bottom:15%; animation-delay:2s;"></div>
<div class="particle" style="left:70%; bottom:12%; animation-delay:3s;"></div>

<!-- Mensaje -->
<div class="message">
  <h1 class="typing">Te doy esta flor amarilla digital para la mejor novia del mundo ❤️</h1>
  <p>Te amo mucho</p>
</div>

</body>
</html>
