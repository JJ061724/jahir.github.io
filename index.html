<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💛</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(#6ec6ff, #b3e5fc 60%, #e1f5fe);
}

/* Nubes */
.cloud {
  position: absolute;
  width: 120px;
  height: 60px;
  background: white;
  border-radius: 50px;
  opacity: 0.9;
  animation: moveClouds 40s linear infinite;
}
@keyframes moveClouds {
  from { transform: translateX(-200px); }
  to { transform: translateX(120vw); }
}

#garden {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(#4CAF50, #1b5e20);
}

.seed {
  width: 12px;
  height: 12px;
  background: brown;
  border-radius: 50%;
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  animation: fall 2s forwards;
}
@keyframes fall { to { top: 60%; } }

/* Girasoles bien hechos */
.sunflower {
  position: absolute;
  bottom: 40%;
  transform: translateX(-50%);
  opacity: 0;
  animation: grow 2s forwards;
}
@keyframes grow {
  from { transform: translate(-50%, 50%) scale(0); opacity: 0; }
  to { transform: translate(-50%, 0) scale(1); opacity: 1; }
}

.stem {
  width: 6px;
  height: 100px;
  background: green;
  margin: 0 auto;
}

.flower {
  position: relative;
  width: 70px;
  height: 70px;
  margin: 0 auto;
}

.petal {
  width: 20px;
  height: 40px;
  background: yellow;
  position: absolute;
  top: 15px;
  left: 25px;
  border-radius: 50%;
  transform-origin: center bottom;
}

.center {
  width: 30px;
  height: 30px;
  background: #5d4037;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Animación suave */
.sunflower {
  animation: grow 2s forwards, sway 3s infinite alternate ease-in-out;
}
@keyframes sway {
  from { transform: translate(-50%,0) rotate(-2deg); }
  to { transform: translate(-50%,0) rotate(2deg); }
}

/* Mensaje con fondo para que se vea */
.message {
  position: absolute;
  top: 10%;
  width: 100%;
  text-align: center;
  opacity: 0;
  animation: fadeIn 3s forwards;
  animation-delay: 5s;
}

.message-box {
  display: inline-block;
  background: rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 15px;
  color: white;
}

@keyframes fadeIn { to { opacity: 1; } }

/* Botón música */
button {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ffeb3b;
  cursor: pointer;
}

</style>
</head>
<body>

<button onclick="playMusic()">💛 Música</button>
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="cloud" style="top:50px;"></div>
<div class="cloud" style="top:120px; animation-duration:50s;"></div>

<div id="garden"></div>
<div class="seed"></div>

<!-- Girasoles -->
<div class="sunflower" style="left:40%; animation-delay:2s;">
  <div class="stem"></div>
  <div class="flower">
    <div class="petal" style="transform:rotate(0deg);"></div>
    <div class="petal" style="transform:rotate(45deg);"></div>
    <div class="petal" style="transform:rotate(90deg);"></div>
    <div class="petal" style="transform:rotate(135deg);"></div>
    <div class="petal" style="transform:rotate(180deg);"></div>
    <div class="petal" style="transform:rotate(225deg);"></div>
    <div class="petal" style="transform:rotate(270deg);"></div>
    <div class="petal" style="transform:rotate(315deg);"></div>
    <div class="center"></div>
  </div>
</div>

<div class="sunflower" style="left:55%; animation-delay:3s;">
  <div class="stem"></div>
  <div class="flower">
    <div class="petal" style="transform:rotate(0deg);"></div>
    <div class="petal" style="transform:rotate(45deg);"></div>
    <div class="petal" style="transform:rotate(90deg);"></div>
    <div class="petal" style="transform:rotate(135deg);"></div>
    <div class="petal" style="transform:rotate(180deg);"></div>
    <div class="petal" style="transform:rotate(225deg);"></div>
    <div class="petal" style="transform:rotate(270deg);"></div>
    <div class="petal" style="transform:rotate(315deg);"></div>
    <div class="center"></div>
  </div>
</div>

<!-- Mensaje -->
<div class="message">
  <div class="message-box">
    <h2>Te doy esta flor amarilla digital para la mejor novia del mundo ❤️</h2>
    <p>Te amo mucho</p>
  </div>
</div>

<script>
function playMusic(){
  document.getElementById('music').play();
}
</script>

</body>
</html>
